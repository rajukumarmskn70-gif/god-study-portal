<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>God Study Portal</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Poppins', sans-serif;
      background: #0f172a;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      overflow-x: hidden;
    }
    
    /* Animated background blobs */
    body::before, body::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      z-index: 0;
      animation: float 15s infinite ease-in-out;
    }
    
    body::before {
      background: #3b82f6;
      top: -100px;
      left: -100px;
    }
    
    body::after {
      background: #ec4899;
      bottom: -100px;
      right: -100px;
      animation-delay: -7s;
    }
    
    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(50px, 50px) scale(1.1); }
    }
    
    .app-container {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      width: 100%;
      max-width: 420px;
      border-radius: 32px;
      padding: 0;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.4);
      position: relative;
      z-index: 1;
      animation: slideUp 0.8s ease-out;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .app-header {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.3), rgba(236, 72, 153, 0.3));
      padding: 35px 25px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .logo {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #3b82f6, #ec4899);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      margin: 0 auto 15px;
      box-shadow: 0 10px 30px rgba(59, 130, 246, 0.4);
    }
    
    .app-header h1 {
      color: #ffffff;
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }
    
    .app-header p {
      color: rgba(255, 255, 255, 0.7);
      font-size: 14px;
    }
    
    .app-content {
      padding: 30px 25px;
    }
    
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-bottom: 25px;
    }
    
    .feature-card {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 20px;
      padding: 20px 15px;
      text-align: center;
      transition: all 0.3s ease;
      cursor: pointer;
    }
    
    .feature-card:hover {
      background: rgba(255, 255, 255, 0.12);
      transform: translateY(-5px);
      border-color: rgba(59, 130, 246, 0.5);
    }
    
    .feature-icon {
      font-size: 32px;
      margin-bottom: 10px;
    }
    
    .feature-card h3 {
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    
    .feature-card p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 12px;
    }
    
    .primary-btn {
      background: linear-gradient(135deg, #3b82f6, #ec4899);
      color: white;
      border: none;
      padding: 16px 30px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 25px rgba(59, 130, 246, 0.4);
    }
    
    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 35px rgba(59, 130, 246, 0.6);
    }
    
    .status {
      text-align: center;
      color: #10b981;
      font-size: 13px;
      margin-top: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    
    .dot {
      width: 8px;
      height: 8px;
      background: #10b981;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="app-header">
      <div class="logo">🙏</div>
      <h1>God Study Portal</h1>
      <p>Next Gen Learning Platform</p>
    </div>
    
    <div class="app-content">
      <div class="grid">
        <div class="feature-card">
          <div class="feature-icon">📚</div>
          <h3>Study</h3>
          <p>Materials</p>
        </div>
        
        <div class="feature-card">
          <div class="feature-icon">⚡</div>
          <h3>Fast</h3>
          <p>Performance</p>
        </div>
        
        <div class="feature-card">
          <div class="feature-icon">🎯</div>
          <h3>Focus</h3>
          <p>Mode</p>
        </div>
        
        <div class="feature-card">
          <div class="feature-icon">🔒</div>
          <h3>Secure</h3>
          <p>Data</p>
        </div>
      </div>
      
      <button class="primary-btn" onclick="alert('Welcome to God Study Portal!')">Launch App</button>
      
      <div class="status">
        <div class="dot"></div>
        System Online
      </div>
    </div>
  </div>
</body>
</html>
